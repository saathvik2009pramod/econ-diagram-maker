<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EconDraw — Economics Diagram Maker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── TOP BAR ── -->
<div class="topbar">
  <div class="brand">EconDraw <span>IGCSE · IB Economics</span></div>
  <div class="topbar-sep"></div>
  <select class="diag-select" id="diagSelect">
    <optgroup label="── Microeconomics ──">
      <option value="supply_demand">Supply &amp; Demand (Equilibrium)</option>
      <option value="supply_demand_shift">Supply &amp; Demand (with Shifts)</option>
      <option value="elasticity">Elasticity (Elastic vs Inelastic)</option>
      <option value="consumer_producer_surplus">Consumer &amp; Producer Surplus</option>
      <option value="tax_incidence">Tax Incidence</option>
      <option value="subsidy">Subsidy</option>
      <option value="price_ceiling">Price Ceiling (Max Price)</option>
      <option value="price_floor">Price Floor (Min Price)</option>
      <option value="negative_externality">Negative Externality</option>
      <option value="positive_externality">Positive Externality</option>
      <option value="costs_revenue">Costs &amp; Revenue (MC/AC/AR/MR)</option>
      <option value="monopoly">Monopoly (Profit Maximisation)</option>
      <option value="perfect_competition">Perfect Competition</option>
    </optgroup>
    <optgroup label="── Macroeconomics ──">
      <option value="ad_as">AD-AS Model</option>
      <option value="phillips_curve">Phillips Curve</option>
      <option value="ppf">Production Possibility Frontier</option>
      <option value="labour_market">Labour Market</option>
    </optgroup>
  </select>
  <button class="topbar-btn" onclick="loadDiagram()">⟳ Load</button>
  <button class="topbar-btn" id="addTextBtn" onclick="toggleTextMode()">✎ Add Text</button>
  <div class="topbar-spacer"></div>
  <button class="topbar-btn" onclick="resetDiagram()">↺ Reset</button>
  <button class="topbar-btn accent" onclick="exportJPEG()">⬇ Export JPEG</button>
</div>

<div class="main">

  <!-- ── LEFT SIDEBAR ── -->
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Curves</div>
      <div id="curveList"></div>
      <button class="add-curve-btn" onclick="addCurve()">+ Add Curve</button>
    </div>

    <div class="sb-section" id="curveControls" style="display:none">
      <div class="sb-label">Selected Curve</div>

      <div class="ctrl-row">
        <span class="ctrl-label">Label</span>
        <input class="ctrl-input" id="curveName" oninput="updateSelectedCurve()" placeholder="e.g. D1">
      </div>

      <div class="ctrl-row">
        <span class="ctrl-label">Style</span>
        <select class="ctrl-input" id="curveStyle" onchange="updateSelectedCurve()">
          <option value="solid">Solid</option>
          <option value="dashed">Dashed</option>
          <option value="dotted">Dotted</option>
        </select>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-label">Colour</span>
        <div class="color-row">
          <div class="color-chip" style="background:#2563eb" data-col="#2563eb" onclick="pickColor(this)"></div>
          <div class="color-chip" style="background:#dc2626" data-col="#dc2626" onclick="pickColor(this)"></div>
          <div class="color-chip" style="background:#16a34a" data-col="#16a34a" onclick="pickColor(this)"></div>
          <div class="color-chip" style="background:#d97706" data-col="#d97706" onclick="pickColor(this)"></div>
          <div class="color-chip" style="background:#7c3aed" data-col="#7c3aed" onclick="pickColor(this)"></div>
          <div class="color-chip" style="background:#0891b2" data-col="#0891b2" onclick="pickColor(this)"></div>
          <div class="color-chip" style="background:#be185d" data-col="#be185d" onclick="pickColor(this)"></div>
          <div class="color-custom-wrap" title="Custom colour">
            <div class="color-chip" style="background:linear-gradient(135deg,#f00,#0f0,#00f)" id="customChip"></div>
            <input type="color" id="customColorPicker" oninput="pickCustomColor(this.value)"
              style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%">
          </div>
        </div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-label">Thickness</span>
        <div class="slider-row">
          <input type="range" class="ctrl-slider" id="curveThick" min="1" max="5" step=".5" value="2"
            oninput="updateSelectedCurve();document.getElementById('thickVal').textContent=this.value">
          <span class="slider-val" id="thickVal">2</span>
        </div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-label">Slope</span>
        <div class="slider-row">
          <input type="range" class="ctrl-slider" id="curveSlope" min="-3" max="3" step=".1" value="-1"
            oninput="updateSelectedCurve();document.getElementById('slopeVal').textContent=this.value">
          <span class="slider-val" id="slopeVal">-1</span>
        </div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-label">Shift</span>
        <div class="shift-grid">
          <div></div>
          <button class="shift-btn" onclick="shiftCurve(0,-5)">↑</button>
          <div></div>
          <button class="shift-btn" onclick="shiftCurve(-5,0)">←</button>
          <button class="shift-btn" onclick="autoSize()" title="Auto-size">⊙</button>
          <button class="shift-btn" onclick="shiftCurve(5,0)">→</button>
          <div></div>
          <button class="shift-btn" onclick="shiftCurve(0,5)">↓</button>
          <div></div>
        </div>
      </div>

      <div class="ctrl-row" style="margin-top:8px">
        <button class="add-curve-btn" onclick="deleteSelectedCurve()"
          style="border-color:rgba(220,38,38,.4);color:rgba(220,100,100,.8)">✕ Delete Curve</button>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Axes</div>
      <div class="ctrl-row">
        <span class="ctrl-label">X-axis label</span>
        <input class="ctrl-input" id="xLabel" value="Quantity (Q)" oninput="redraw()">
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">Y-axis label</span>
        <input class="ctrl-input" id="yLabel" value="Price (P)" oninput="redraw()">
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Intersection Points</div>
      <div id="intersectList"></div>
      <button class="add-curve-btn" onclick="addIntersectPoint()">+ Add Point</button>
    </div>
  </div>

  <!-- ── CANVAS AREA ── -->
  <div class="canvas-area">
    <div class="fmt-toolbar">
      <button class="fmt-btn" id="fmtBold"  onclick="fmt('bold')"        title="Bold"><b>B</b></button>
      <button class="fmt-btn" id="fmtItal"  onclick="fmt('italic')"      title="Italic"><i>I</i></button>
      <button class="fmt-btn" id="fmtUnder" onclick="fmt('underline')"   title="Underline" style="text-decoration:underline">U</button>
      <button class="fmt-btn" id="fmtSub"   onclick="fmt('subscript')"   title="Subscript">x<sub>2</sub></button>
      <button class="fmt-btn" id="fmtSup"   onclick="fmt('superscript')" title="Superscript">x<sup>2</sup></button>
      <div class="fmt-sep"></div>
      <select class="font-size-select" id="fontSizeSelect" onchange="fmt('fontSize',this.value)">
        <option value="1">8pt</option>
        <option value="2">10pt</option>
        <option value="3" selected>12pt</option>
        <option value="4">14pt</option>
        <option value="5">18pt</option>
        <option value="6">24pt</option>
      </select>
      <div class="fmt-sep"></div>
      <span class="fmt-hint">✎ Click canvas to add text box · Click curve to select</span>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="diag" width="680" height="520"></canvas>
      <div class="intersect-popup" id="intersectPopup">
        <h4>Label this point</h4>
        <div class="ip-row">
          <span class="ip-lbl">P</span>
          <input class="ip-input" id="ipY" placeholder="e.g. P₁" oninput="updateIntersectLabel()">
        </div>
        <div class="ip-row">
          <span class="ip-lbl">Q</span>
          <input class="ip-input" id="ipX" placeholder="e.g. Q₁" oninput="updateIntersectLabel()">
        </div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right-panel">
    <div class="sb-section">
      <div class="sb-label">Auto-Size</div>
      <button class="autosize-btn" onclick="autoSize()">⊙ Auto-fit all curves</button>
    </div>

    <div class="sb-section">
      <div class="sb-label">Shading</div>
      <div id="shadePanel"></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Canvas Size</div>
      <div class="ctrl-row">
        <span class="ctrl-label" style="color:rgba(255,255,255,.5)">Width</span>
        <input class="ctrl-input" id="canvasW" type="number" value="680" min="400" max="1200" oninput="resizeCanvas()">
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label" style="color:rgba(255,255,255,.5)">Height</span>
        <input class="ctrl-input" id="canvasH" type="number" value="520" min="300" max="900" oninput="resizeCanvas()">
      </div>
    </div>
  </div>

</div><!-- /main -->

<script src="app.js"></script>
</body>
</html>
