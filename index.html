<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoGraph Pro | Professional Edition</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="splash-screen" class="view-container">
        <div class="splash-card">
            <div class="logo-large"><i data-lucide="trending-up"></i><h1>EcoGraph Pro</h1></div>
            <div class="diagram-options">
                <div class="diagram-card active" data-type="supply-demand"><h3>Micro: S&D</h3><p>Equilibrium & Shifts</p></div>
                <div class="diagram-card" data-type="monopoly"><h3>Monopoly</h3><p>Allows negative Y-axis</p></div>
                <div class="diagram-card" data-type="macro"><h3>Macro: AD-AS</h3><p>Growth & Inflation</p></div>
            </div>
            <button id="start-btn" class="btn-primary">Launch Workspace <i data-lucide="arrow-right"></i></button>
        </div>
    </div>

    <div id="editor-screen" class="app-container hidden">
        <div id="text-toolbar" class="toolbar hidden">
            <button onclick="applyStyle('bold')" title="Bold"><i data-lucide="bold"></i></button>
            <button onclick="applyStyle('italic')" title="Italic"><i data-lucide="italic"></i></button>
            <button onclick="applyStyle('sub')" title="Subscript">x<sub>2</sub></button>
            <input type="number" id="font-size" value="14" min="8" max="32" onchange="applyStyle('size')">
            <input type="color" id="color-picker" onchange="applyStyle('color')">
        </div>

        <aside class="sidebar">
            <div class="logo"><h2>EcoGraph</h2></div>
            
            <div class="control-section">
                <div class="section-header"><label>Demand</label><button id="add-d" class="icon-btn"><i data-lucide="plus"></i></button></div>
                <div id="d-list"></div>
            </div>

            <div class="control-section">
                <div class="section-header"><label>Supply</label><button id="add-s" class="icon-btn"><i data-lucide="plus"></i></button></div>
                <div id="s-list"></div>
            </div>

            <div class="actions">
                <button id="auto-size" class="btn-secondary"><i data-lucide="maximize"></i> Auto-Size</button>
                <button id="export-btn" class="btn-primary"><i data-lucide="image"></i> Export JPEG</button>
            </div>
            <p class="hint">Tip: Click anywhere on graph to add text. Click a curve to color it.</p>
        </aside>

        <main class="canvas-area">
            <div id="canvas-wrapper" class="graph-card">
                <div id="graph-container"></div>
                <div id="axis-inputs"></div>
            </div>
        </main>
    </div>

    <script src="src/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
